<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SRM Browser Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #131a2f;
      --panel-2: #1b2542;
      --text: #e8edf8;
      --muted: #9ca7bf;
      --accent: #67e8f9;
      --accent-2: #8b5cf6;
      --ok: #34d399;
      --warn: #fbbf24;
      --border: rgba(255,255,255,0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020, #11192d 45%, #0b1020);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    h1, h2, h3, p { margin-top: 0; }
    .hero {
      text-align: center;
      margin-bottom: 24px;
    }
    .hero .card {
      padding: 16px;
    }
    .hero .title {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      margin-bottom: 6px;
    }
    .hero .subtitle {
      font-size: 0.9rem;
      margin-bottom: 12px;
      opacity: 0.8;
    }
    .hero .prompt-list {
      margin-top: 8px;
      height: 20px;
      overflow: hidden;
    }
    .hero .prompt-chip {
      font-size: 0.75rem;
      padding: 4px 8px;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      animation: fadeInOut 3s ease-in-out;
      position: absolute;
    }
    .prompt-container {
      position: relative;
      height: 20px;
      display: inline-block;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(10px); }
      20% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }
    .card {
      background: rgba(19,26,47,0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }
    .title {
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.05;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--muted);
      line-height: 1.5;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .badge {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(103,232,249,0.08);
      border: 1px solid rgba(103,232,249,0.18);
      color: var(--accent);
      font-size: 0.9rem;
    }
    .panels {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr 1fr;
      min-height: 500px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="number"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    textarea, select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    .collapsible {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 12px;
      overflow: hidden;
    }
    .collapsible-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      transition: background 0.2s;
    }
    .collapsible-header:hover {
      background: rgba(255,255,255,0.05);
    }
    .collapsible-content {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease-out;
    }
    .collapsible.open .collapsible-content {
      padding: 0 16px 16px;
      max-height: 800px;
    }
    .chevron {
      transition: transform 0.3s;
      font-size: 0.8em;
    }
    .collapsible.open .chevron {
      transform: rotate(180deg);
    }
    button {
      cursor: pointer;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      color: white;
      background: linear-gradient(135deg, var(--accent-2), #2563eb);
      box-shadow: 0 10px 24px rgba(37,99,235,0.28);
    }
    button.secondary {
      background: rgba(255,255,255,0.06);
      box-shadow: none;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .prompt-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .prompt-chip {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.92rem;
    }
    .response {
      white-space: pre-wrap;
      line-height: 1.6;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 140px;
      position: relative;
      overflow: hidden;
    }
    .response.generating::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(103,232,249,0.1), transparent);
      animation: shimmer 1.5s infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .char {
      opacity: 0;
      animation: typeChar 0.05s ease-out forwards;
    }
    @keyframes typeChar {
      0% { opacity: 0; transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .meta {
      color: var(--muted);
      font-size: 0.94rem;
      margin-top: 10px;
      line-height: 1.5;
    }
    ol.memories {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 10px;
    }
    ol.memories li {
      line-height: 1.5;
      color: var(--text);
    }
    .small {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .status {
      color: var(--ok);
      font-weight: 600;
    }
    .warn { color: var(--warn); }
    @media (max-width: 960px) {
      .panels { grid-template-columns: 1fr; }
    }
    .details-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .memories-list {
      margin: 12px 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
    }
    .memories-list li {
      line-height: 1.5;
      color: var(--text);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="card">
        <h1 class="title">SRM browser demo</h1>
        <p class="subtitle">
          CPU-friendly specialized system using stochastic search and explicit memories
        </p>
      </div>
    </section>

    <section class="panels">
      <div class="card">
        <h3>Query</h3>
        <label for="query">Ask anything <span class="prompt-container" id="rotatingPrompts"></span></label>
        <textarea id="query" placeholder="Try: Who are you, I am bored, or write javascript code to fetch json"></textarea>
        
        <div class="row" style="margin-top:12px;">
          <div>
            <label for="dataset">Demo memory set</label>
            <select id="dataset">
              <option value="chat">Chat KB</option>
              <option value="js">JavaScript KB</option>
              <option value="sample">Science sample KB</option>
              <option value="all" selected>All KBs</option>
            </select>
          </div>
          <div>
            <label for="mode">Response style</label>
            <select id="mode">
              <option value="auto" selected>Auto</option>
              <option value="synth">Synth</option>
              <option value="reconstruct">Reconstruct</option>
            </select>
          </div>
        </div>

        <button id="runBtn" style="width: 100%;">Run demo</button>

        <div class="collapsible" id="configCollapsible">
          <div class="collapsible-header">
            <span>⚙️ Advanced configuration</span>
            <span class="chevron">▼</span>
          </div>
          <div class="collapsible-content">
            <div class="row">
              <div>
                <label for="cfgScoreFloor">Score floor</label>
                <input id="cfgScoreFloor" type="number" min="0" max="1" step="0.01">
              </div>
              <div>
                <label for="cfgSelectionLimit">Selection limit</label>
                <input id="cfgSelectionLimit" type="number" min="1" max="12" step="1">
              </div>
            </div>
            <div class="row" style="margin-top:12px;">
              <div>
                <label for="cfgReconstructLimit">Reconstruct limit</label>
                <input id="cfgReconstructLimit" type="number" min="1" max="12" step="1">
              </div>
              <div>
                <label for="cfgSynthLimit">Synth limit</label>
                <input id="cfgSynthLimit" type="number" min="1" max="12" step="1">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Response</h3>
        <div id="response" class="response">Loading demo data…</div>
        <div id="meta" class="meta"></div>
        
        <div id="detailsSection" class="details-section" style="display: none;">
          <h4 style="margin:0 0 10px; font-size: 0.95rem;">Selected memories</h4>
          <ol id="memories" class="memories-list"></ol>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STOPWORDS = new Set([
      'the','a','an','is','are','was','were','in','of','to','and','or','it','its','this','that','these','those','be','been','by','for','with','on','at','from','as','into','through','during','before','after','above','below','between','each','few','more','most','other','some','such','no','nor','not','only','own','same','so','than','too','very','can','will','just','should','now','have','has','had','do','does','did','would','could','may','might','also','which','who','how','what','when','where','why','about','used','using','their','they','them','we','us','you','he','she','his','her','all','any'
    ]);
    const CONNECTIVES = ['Additionally, ', 'Furthermore, ', 'In summary, '];
    const DEFAULT_DEMO_CONFIG = {
      score_floor: 0.01,
      selection_limit: 4,
      reconstruct_limit: 3,
      synth_limit: 3,
      overlap_floor: 3,
      overlap_ratio: 0.6,
      auto_reconstruct_avg_words_below: 11,
      cluster_limit: 2,
      cluster_sentence_bias: 0.18,
      cluster_phrase_bias: 0.28,
    };

    function tokenise(text) {
      return (text.toLowerCase().match(/[a-z]+/g) || []).filter(w => w.length > 1);
    }

    function expandQuery(text, expansions) {
      const toks = tokenise(text);
      const seen = new Set(toks);
      const extras = [];
      for (const t of toks) {
        for (const exp of (expansions[t] || [])) {
          if (!seen.has(exp)) {
            seen.add(exp);
            extras.push(exp);
          }
        }
      }
      return extras.length ? `${text} ${extras.join(' ')}` : text;
    }

    function idfTable(corpus) {
      const df = new Map();
      const n = corpus.length || 1;
      for (const doc of corpus) {
        const uniq = new Set(tokenise(doc));
        for (const tok of uniq) {
          df.set(tok, (df.get(tok) || 0) + 1);
        }
      }
      const out = new Map();
      for (const [tok, f] of df.entries()) {
        out.set(tok, Math.log((n + 1) / (f + 1)) + 0.5);
      }
      return out;
    }

    function tfidfVec(tokens, idf) {
      const content = tokens.filter(t => !STOPWORDS.has(t) && t.length > 2);
      const used = content.length ? content : tokens;
      const tf = new Map();
      for (const t of used) tf.set(t, (tf.get(t) || 0) + 1);
      const n = Math.max(used.length, 1);
      const out = new Map();
      for (const [t, c] of tf.entries()) out.set(t, (c / n) * (idf.get(t) || 0));
      return out;
    }

    function contentTokens(tokens) {
      return tokens.filter(t => !STOPWORDS.has(t) && t.length > 2);
    }

    function cosine(a, b) {
      let dot = 0, na = 0, nb = 0;
      for (const v of a.values()) na += v * v;
      for (const v of b.values()) nb += v * v;
      for (const [k, v] of a.entries()) {
        if (b.has(k)) dot += v * b.get(k);
      }
      return na && nb ? dot / (Math.sqrt(na) * Math.sqrt(nb)) : 0;
    }

    function overlapScore(qTokens, docTokens, useRawTokens = false) {
      const qBase = useRawTokens ? qTokens : contentTokens(qTokens);
      const dBase = useRawTokens ? docTokens : contentTokens(docTokens);
      const q = new Set(qBase);
      const d = new Set(dBase);
      let hits = 0;
      for (const t of q) if (d.has(t)) hits += 1;
      return q.size ? hits / q.size : 0;
    }

    function numberOr(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function getDemoConfig(data) {
      const raw = { ...DEFAULT_DEMO_CONFIG, ...(data.demoConfig || {}) };
      return {
        score_floor: numberOr(raw.score_floor, DEFAULT_DEMO_CONFIG.score_floor),
        selection_limit: Math.max(1, Math.floor(numberOr(raw.selection_limit, DEFAULT_DEMO_CONFIG.selection_limit))),
        reconstruct_limit: Math.max(1, Math.floor(numberOr(raw.reconstruct_limit, DEFAULT_DEMO_CONFIG.reconstruct_limit))),
        synth_limit: Math.max(1, Math.floor(numberOr(raw.synth_limit, DEFAULT_DEMO_CONFIG.synth_limit))),
        overlap_floor: Math.max(1, Math.floor(numberOr(raw.overlap_floor, DEFAULT_DEMO_CONFIG.overlap_floor))),
        overlap_ratio: Math.min(1, Math.max(0, numberOr(raw.overlap_ratio, DEFAULT_DEMO_CONFIG.overlap_ratio))),
        auto_reconstruct_avg_words_below: Math.max(1, numberOr(raw.auto_reconstruct_avg_words_below, DEFAULT_DEMO_CONFIG.auto_reconstruct_avg_words_below)),
        cluster_limit: Math.max(1, Math.floor(numberOr(raw.cluster_limit, DEFAULT_DEMO_CONFIG.cluster_limit))),
        cluster_sentence_bias: Math.max(0, numberOr(raw.cluster_sentence_bias, DEFAULT_DEMO_CONFIG.cluster_sentence_bias)),
        cluster_phrase_bias: Math.max(0, numberOr(raw.cluster_phrase_bias, DEFAULT_DEMO_CONFIG.cluster_phrase_bias)),
      };
    }

    function syncConfigInputs(config) {
      document.getElementById('cfgScoreFloor').value = config.score_floor;
      document.getElementById('cfgSelectionLimit').value = config.selection_limit;
      document.getElementById('cfgReconstructLimit').value = config.reconstruct_limit;
      document.getElementById('cfgSynthLimit').value = config.synth_limit;
    }

    function readConfigFromInputs(data) {
      const config = getDemoConfig(data);
      return {
        score_floor: Math.min(1, Math.max(0, numberOr(document.getElementById('cfgScoreFloor').value, config.score_floor))),
        selection_limit: Math.max(1, Math.floor(numberOr(document.getElementById('cfgSelectionLimit').value, config.selection_limit))),
        reconstruct_limit: Math.max(1, Math.floor(numberOr(document.getElementById('cfgReconstructLimit').value, config.reconstruct_limit))),
        synth_limit: Math.max(1, Math.floor(numberOr(document.getElementById('cfgSynthLimit').value, config.synth_limit))),
        overlap_floor: config.overlap_floor,
        overlap_ratio: config.overlap_ratio,
        auto_reconstruct_avg_words_below: config.auto_reconstruct_avg_words_below,
        cluster_limit: config.cluster_limit,
        cluster_sentence_bias: config.cluster_sentence_bias,
        cluster_phrase_bias: config.cluster_phrase_bias,
      };
    }

    function scoreTextAgainstQuery(qTokens, text, idf, useRawTokens) {
      const dTokens = tokenise(text);
      const dVec = tfidfVec(useRawTokens ? dTokens : contentTokens(dTokens), idf);
      const qVec = tfidfVec(useRawTokens ? qTokens : contentTokens(qTokens), idf);
      const cos = cosine(qVec, dVec);
      const overlap = overlapScore(qTokens, dTokens, useRawTokens);
      return { cos, overlap, score: 0.7 * cos + 0.3 * overlap };
    }

    function flattenClusteredKb(clusters) {
      return (clusters || []).flatMap(cluster => (cluster.entries || []).map(text => ({ text, cluster })));
    }

    function selectMemories(query, corpus, expansions, config, clusters = []) {
      const expanded = expandQuery(query, expansions);
      const qTokens = tokenise(expanded);
      const useRawTokens = contentTokens(qTokens).length === 0;
      const corpusEntries = clusters.length ? flattenClusteredKb(clusters) : corpus.map(text => ({ text, cluster: null }));
      const idf = idfTable(corpusEntries.map(item => item.text));
      const topClusters = clusters.length
        ? clusters
            .map((cluster, idx) => {
              const clusterText = `${cluster.label} ${cluster.summary} ${(cluster.entries || []).join(' ')}`;
              const metrics = scoreTextAgainstQuery(qTokens, clusterText, idf, useRawTokens);
              return { ...cluster, idx, clusterScore: metrics.score };
            })
            .sort((a, b) => b.clusterScore - a.clusterScore)
            .slice(0, config.cluster_limit)
        : [];
      const topClusterLabels = new Set(topClusters.map(cluster => cluster.label));
      const ranked = corpusEntries.map((item, idx) => {
        const metrics = scoreTextAgainstQuery(qTokens, item.text, idf, useRawTokens);
        const bias = item.cluster && topClusterLabels.has(item.cluster.label)
          ? item.cluster.kind === 'phrase'
            ? config.cluster_phrase_bias
            : config.cluster_sentence_bias
          : 0;
        return {
          idx,
          text: item.text,
          cos: metrics.cos,
          overlap: metrics.overlap,
          score: metrics.score + bias,
          cluster: item.cluster ? item.cluster.label : null,
          clusterKind: item.cluster ? item.cluster.kind : null,
        };
      }).sort((a, b) => b.score - a.score);
      return { expanded, picked: ranked.filter(x => x.score > config.score_floor).slice(0, config.selection_limit) };
    }

    function reconstruct(picked, config) {
      if (!picked.length) return 'No relevant memories found in the selected demo KB.';
      return picked.map(x => x.text.trim()).slice(0, config.reconstruct_limit).join(' ');
    }

    function synthesise(query, picked, config) {
      if (!picked.length) return 'No relevant memories found in the selected demo KB.';
      const lines = picked.map(x => x.text.trim()).filter(Boolean);
      if (!lines.length) return 'No relevant memories found in the selected demo KB.';
      const chosen = [];
      for (const line of lines) {
        const lt = new Set(tokenise(line));
        const redundant = chosen.some(prev => {
          const pt = new Set(tokenise(prev));
          let overlap = 0;
          for (const t of lt) if (pt.has(t)) overlap += 1;
          return overlap >= Math.max(config.overlap_floor, Math.floor(lt.size * config.overlap_ratio));
        });
        if (!redundant) chosen.push(line);
        if (chosen.length >= config.synth_limit) break;
      }
      if (chosen.length === 1) return chosen[0];
      return chosen.map((line, i) => i === 0 ? line : `${CONNECTIVES[(i - 1) % CONNECTIVES.length]}${line.charAt(0).toLowerCase()}${line.slice(1)}`).join(' ');
    }

    function chooseMode(picked, forcedMode, config) {
      if (forcedMode !== 'auto') return forcedMode;
      const avgWords = picked.length ? picked.reduce((n, x) => n + tokenise(x.text).length, 0) / picked.length : 0;
      return avgWords < config.auto_reconstruct_avg_words_below ? 'reconstruct' : 'synth';
    }

    function animateText(text, element) {
      element.innerHTML = '';
      element.classList.add('generating');
      
      // Split into words and characters for fast animation
      const words = text.split(' ');
      let charIndex = 0;
      
      function addNextWord() {
        if (charIndex >= words.length) {
          element.classList.remove('generating');
          return;
        }
        
        const word = words[charIndex];
        const wordSpan = document.createElement('span');
        wordSpan.style.display = 'inline-block';
        wordSpan.style.marginRight = '0.3em';
        
        // Add each character with fast animation
        for (let i = 0; i < word.length; i++) {
          const charSpan = document.createElement('span');
          charSpan.className = 'char';
          charSpan.textContent = word[i];
          charSpan.style.animationDelay = `${(charIndex * 50 + i * 5)}ms`;
          wordSpan.appendChild(charSpan);
        }
        
        element.appendChild(wordSpan);
        charIndex++;
        
        // Fast word-by-word reveal
        setTimeout(addNextWord, 30);
      }
      
      addNextWord();
    }

    function render(result) {
      const responseEl = document.getElementById('response');
      animateText(result.response, responseEl);
      
      document.getElementById('meta').innerHTML = `
        <div><span class="status">Loaded</span> version ${result.version}</div>
        <div>Expanded query: <code>${result.expanded}</code></div>
        <div>Mode: <strong>${result.mode}</strong></div>
      `;
      
      const detailsSection = document.getElementById('detailsSection');
      const list = document.getElementById('memories');
      
      if (result.picked.length > 0) {
        detailsSection.style.display = 'block';
        list.innerHTML = '';
        for (const item of result.picked) {
          const li = document.createElement('li');
          li.innerHTML = `${item.text} <div class="small">score=${item.score.toFixed(3)} cosine=${item.cos.toFixed(3)} overlap=${item.overlap.toFixed(3)}</div>`;
          list.appendChild(li);
        }
      } else {
        detailsSection.style.display = 'none';
      }
    }

    async function boot() {
      const res = await fetch('./demo-data.json');
      const data = await res.json();
      syncConfigInputs(getDemoConfig(data));
      
      // Setup collapsible config
      const configCollapsible = document.getElementById('configCollapsible');
      const configHeader = configCollapsible.querySelector('.collapsible-header');
      configHeader.addEventListener('click', () => {
        configCollapsible.classList.toggle('open');
      });
      
      // Setup rotating prompts
      const rotatingPrompts = document.getElementById('rotatingPrompts');
      const prompts = data.prompts;
      let currentIndex = 0;
      
      function showNextPrompts() {
        rotatingPrompts.innerHTML = '';
        
        // Show two prompts at a time
        for (let i = 0; i < 2 && currentIndex < prompts.length; i++) {
          const prompt = prompts[currentIndex + i];
          const chip = document.createElement('span');
          chip.className = 'prompt-chip';
          chip.textContent = prompt;
          chip.style.animationDelay = `${i * 0.2}s`;
          chip.style.cursor = 'pointer';
          chip.onclick = () => {
            document.getElementById('query').value = prompt;
            run(data);
          };
          rotatingPrompts.appendChild(chip);
        }
        
        currentIndex = (currentIndex + 2) % prompts.length;
      }
      
      // Start rotation and repeat every 3 seconds
      showNextPrompts();
      setInterval(showNextPrompts, 3000);

      document.getElementById('response').textContent = 'Ready. Pick a prompt or type your own query.';
      document.getElementById('meta').innerHTML = `<div class="status">Demo data loaded</div><div>Version ${data.version}</div>`;

      document.getElementById('runBtn').onclick = () => run(data);
      
      // Add Enter functionality (Shift+Enter for newline)
      document.getElementById('query').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          run(data);
        }
      });
    }

    function run(data) {
      const query = document.getElementById('query').value.trim();
      if (!query) {
        document.getElementById('response').textContent = 'Enter a query first.';
        return;
      }
      const dataset = document.getElementById('dataset').value;
      const forcedMode = document.getElementById('mode').value;
      const config = readConfigFromInputs(data);
      const corpus = dataset === 'chat'
        ? data.chatKb
        : dataset === 'js'
        ? data.jsKb
        : dataset === 'sample'
        ? data.sampleKb
        : data.chatKb.concat(data.jsKb, data.sampleKb);
      const clusteredKb = data.clusteredKb || {};
      const clusters = dataset === 'chat'
        ? (clusteredKb.chat || [])
        : dataset === 'js'
        ? (clusteredKb.js || [])
        : dataset === 'sample'
        ? (clusteredKb.sample || [])
        : [...(clusteredKb.chat || []), ...(clusteredKb.js || []), ...(clusteredKb.sample || [])];
      const { expanded, picked } = selectMemories(query, corpus, data.expansions, config, clusters);
      const mode = chooseMode(picked, forcedMode, config);
      const response = mode === 'reconstruct' ? reconstruct(picked, config) : synthesise(query, picked, config);
      render({ version: data.version, expanded, picked, response, mode, config });
    }

    boot().catch(err => {
      document.getElementById('response').textContent = `Could not load demo data: ${err}`;
      document.getElementById('meta').textContent = 'Make sure docs/demo-data.json exists.';
    });
  </script>
</body>
</html>
